name: Check tickets and deploy site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"
    - cron: "0 * 8-15 6 *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check schedule window
        id: schedule
        run: |
          set +e
          node src/should-run.js
          code=$?
          if [ "$code" = "78" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$code"

      - name: Setup Node
        if: steps.schedule.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.schedule.outputs.skip != 'true'
        run: npm ci

      - name: Install browser
        if: steps.schedule.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Test detectors
        if: steps.schedule.outputs.skip != 'true'
        run: npm test

      - name: Check ticket sources
        if: steps.schedule.outputs.skip != 'true'
        run: npm run check

      - name: Notify on new availability
        if: steps.schedule.outputs.skip != 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          PREVIOUS_STATUS_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/status.json
        run: npm run notify

      - name: Build site
        if: steps.schedule.outputs.skip != 'true'
        run: npm run build

      - name: Configure Pages
        if: steps.schedule.outputs.skip != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.schedule.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.schedule.outputs.skip != 'true'
        uses: actions/deploy-pages@v4
