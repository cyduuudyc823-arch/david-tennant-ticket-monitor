<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>David Tennant Ticket Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Ticket monitor</p>
          <h1>David Tennant<br />White Rabbit Red Rabbit</h1>
          <p class="meta">Duchess Theatre, London · 15 June 2026 · 19:30</p>
        </div>
        <div id="overall" class="status-card status-unknown">Loading status...</div>
      </section>

      <section class="summary">
        <div>
          <span class="label">Last checked</span>
          <strong id="checked-at">Loading...</strong>
        </div>
        <a href="./status.json">Raw status JSON</a>
      </section>

      <section id="sources" class="sources" aria-label="Ticket sources"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
